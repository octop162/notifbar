pre-push:
  commands:
    no-push-main:
      run: |
        branch=$(git symbolic-ref HEAD | sed 's|refs/heads/||')
        if [ "$branch" = "main" ]; then
          echo "Error: mainブランチへの直接pushは禁止されています。PRを使用してください。"
          exit 1
        fi

pre-commit:
  parallel: false
  commands:
    fmt:
      run: cargo fmt -- --check
    clippy:
      run: cargo clippy -- -D warnings
    test:
      run: cargo test
